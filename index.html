<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Triatló Fornells App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const START_DATE = "2026-04-08";
      const RACE_DATE = "2026-09-27";
      const STORAGE_KEY = "fornells-triathlon-public-v1";

      const phases = [
        { name: "Base", startWeek: 1, endWeek: 7, color: "bg-slate-100 text-slate-700" },
        { name: "Construcció", startWeek: 8, endWeek: 14, color: "bg-blue-100 text-blue-700" },
        { name: "Específica", startWeek: 15, endWeek: 22, color: "bg-amber-100 text-amber-700" },
        { name: "Taper", startWeek: 23, endWeek: 24, color: "bg-emerald-100 text-emerald-700" },
      ];

      const weekTemplates = {
        base: [
          { day: "Dilluns", type: "run", title: "Run suau + core", details: "6-8 km a ritme còmode + 10' core", duration: "60-75 min", focus: "Base aeròbica" },
          { day: "Dimarts", type: "strength", title: "Força curta + bici suau", details: "15-20' força + 35-45' bici carretera", duration: "50-65 min", focus: "Eficiència + estabilitat" },
          { day: "Dimecres", type: "run", title: "Intervals / VO2", details: "5x400 m controlats + escalfament", duration: "50-65 min", focus: "VO2 max" },
          { day: "Dijous", type: "strength", title: "Força full body", details: "Sentadilles, zancades, pes mort, flexions, planxes", duration: "35-45 min", focus: "Core i estabilitat" },
          { day: "Divendres", type: "rest", title: "Descans", details: "Descans complet o mobilitat suau", duration: "—", focus: "Recuperació" },
          { day: "Dissabte", type: "brick", title: "Brick suau + força curta", details: "60' bici + 2-3 km run + 10' core", duration: "85-100 min", focus: "Transició" },
          { day: "Diumenge", type: "bike", title: "BTT llarga", details: "Volta habitual 40-50 km", duration: "2h30-3h", focus: "Resistència" },
        ],
        build: [
          { day: "Dilluns", type: "run", title: "Run qualitat", details: "6x600 o 4x800 controlats", duration: "55-70 min", focus: "Velocitat aeròbica" },
          { day: "Dimarts", type: "swim", title: "Natació tècnica + força curta", details: "200 suaus + 6x50 tècnica + 4x100 + 10' core", duration: "55-70 min", focus: "Entrada a l'aigua" },
          { day: "Dimecres", type: "bike", title: "Bici carretera", details: "60-75' amb blocs moderats", duration: "60-75 min", focus: "Potència sostinguda" },
          { day: "Dijous", type: "strength", title: "Força full body", details: "Treball funcional i gomes per natació", duration: "35-45 min", focus: "Prevenció" },
          { day: "Divendres", type: "rest", title: "Descans", details: "Descans o mobilitat", duration: "—", focus: "Recuperació" },
          { day: "Dissabte", type: "brick", title: "Brick mitjà + força curta", details: "75-90' bici + 4-5 km run + 10' core", duration: "105-130 min", focus: "Especificitat" },
          { day: "Diumenge", type: "swim", title: "Natació resistència", details: "1.000-1.500 m progressius o per blocs", duration: "35-50 min", focus: "Fons a l'aigua" },
        ],
        specific: [
          { day: "Dilluns", type: "swim", title: "Natació contínua + core curt", details: "1.200-1.800 m + 10' core", duration: "50-65 min", focus: "Resistència" },
          { day: "Dimarts", type: "run", title: "Run tempo", details: "2 km suau + 5-6 km còmodes però alegres + 1 km suau", duration: "50-65 min", focus: "Ritme carrera" },
          { day: "Dimecres", type: "bike", title: "Bici específica + força curta", details: "75-90' a ritme de competició + 10' core", duration: "90-105 min", focus: "Pacing" },
          { day: "Dijous", type: "strength", title: "Força lleugera + mobilitat", details: "Activació, core i tren superior", duration: "25-35 min", focus: "Manteniment" },
          { day: "Divendres", type: "rest", title: "Descans", details: "Descans complet", duration: "—", focus: "Recuperació" },
          { day: "Dissabte", type: "brick", title: "Brick llarg + força curta", details: "30-35 km bici + 5-7 km run + 10' core", duration: "2h-2h30", focus: "Simulació" },
          { day: "Diumenge", type: "swim", title: "Mar / tècnica", details: "Nedar al mar o piscina suau", duration: "35-50 min", focus: "Aigües obertes" },
        ],
        taper: [
          { day: "Dilluns", type: "swim", title: "Natació suau", details: "1.000-1.200 m còmodes", duration: "30-40 min", focus: "Activació" },
          { day: "Dimarts", type: "run", title: "Run curt + core", details: "5-6 km amb progressius + 10' core", duration: "40-50 min", focus: "Frescor" },
          { day: "Dimecres", type: "bike", title: "Bici curta + força curta", details: "45-60' + 10' tren superior", duration: "55-70 min", focus: "Sensacions" },
          { day: "Dijous", type: "strength", title: "Core i mobilitat", details: "Molt lleuger", duration: "15-20 min", focus: "Tonus" },
          { day: "Divendres", type: "rest", title: "Descans", details: "Descans complet", duration: "—", focus: "Recuperació" },
          { day: "Dissabte", type: "brick", title: "Activació", details: "20-30' bici + 10' run", duration: "30-45 min", focus: "Despertar cames" },
          { day: "Diumenge", type: "race", title: "TRIATLÓ DE FORNELLS", details: "1500 m / 40 km / 10 km", duration: "Objectiu", focus: "Competició" },
        ],
      };

      const alternatives = {
        bike: [
          { type: "run", title: "Run suau alternatiu", details: "6-8 km a ritme còmode" },
          { type: "strength", title: "Força + core", details: "20-30' core i tren superior" },
        ],
        run: [
          { type: "bike", title: "Bici suau", details: "45-60' cadència alta" },
          { type: "strength", title: "Força", details: "Treball de cames + core" },
        ],
        strength: [
          { type: "run", title: "Run curt", details: "4-5 km suau" },
          { type: "bike", title: "Bici curta", details: "30-45' suau" },
        ],
        brick: [
          { type: "bike", title: "Només bici", details: "60-75' suau" },
          { type: "run", title: "Només run", details: "5-7 km còmode" },
          { type: "strength", title: "Core + tren superior", details: "20-25' treball funcional" },
        ],
        swim: [
          { type: "strength", title: "Gomes + escàpula", details: "15-20' activació específica de natació" },
          { type: "run", title: "Run regeneratiu", details: "4-6 km molt suaus" },
        ],
      };

      function daysBetween(a, b) {
        const ms = new Date(b).setHours(0, 0, 0, 0) - new Date(a).setHours(0, 0, 0, 0);
        return Math.floor(ms / (1000 * 60 * 60 * 24));
      }

      function getCurrentWeek() {
        const diff = daysBetween(START_DATE, new Date().toISOString().slice(0, 10));
        return Math.max(1, Math.min(24, Math.floor(diff / 7) + 1));
      }

      function getPhaseFromWeek(week) {
        if (week <= 7) return "base";
        if (week <= 14) return "build";
        if (week <= 22) return "specific";
        return "taper";
      }

      function getPhaseLabel(week) {
        return phases.find((p) => week >= p.startWeek && week <= p.endWeek) || phases[0];
      }

      function getWeekPlan(week) {
        return weekTemplates[getPhaseFromWeek(week)];
      }

      function getTodayIndex() {
        const jsDay = new Date().getDay();
        return jsDay === 0 ? 6 : jsDay - 1;
      }

      function getDefaultLogs(plan, week, logs) {
        const next = { ...logs };
        plan.forEach((session, idx) => {
          const key = `${week}-${idx}`;
          if (!next[key]) {
            next[key] = {
              plannedType: session.type,
              actualType: session.type,
              time: "",
              distance: "",
              feeling: "",
              notes: "",
              adapted: false,
            };
          }
        });
        return next;
      }

      function emoji(type) {
        return { run: "🏃", bike: "🚴", swim: "🏊", strength: "🏋️", brick: "🔁", rest: "😴", race: "🏁" }[type] || "📅";
      }

      function App() {
        const [week, setWeek] = useState(getCurrentWeek());
        const [checks, setChecks] = useState({});
        const [logs, setLogs] = useState({});
        const [goal, setGoal] = useState("enjoy");
        const [notes, setNotes] = useState("");
        const [openAlt, setOpenAlt] = useState({});

        const weekPlan = useMemo(() => getWeekPlan(week), [week]);
        const currentPhase = getPhaseLabel(week);
        const todayIndex = getTodayIndex();
        const todayWorkout = weekPlan[todayIndex];
        const completion = Math.round((weekPlan.filter((_, i) => checks[`${week}-${i}`]).length / weekPlan.length) * 100);
        const daysToRace = daysBetween(new Date().toISOString().slice(0, 10), RACE_DATE);

        useEffect(() => {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            setWeek(data.week || getCurrentWeek());
            setChecks(data.checks || {});
            setLogs(data.logs || {});
            setGoal(data.goal || "enjoy");
            setNotes(data.notes || "");
          }
        }, []);

        useEffect(() => {
          setLogs((prev) => getDefaultLogs(weekPlan, week, prev));
        }, [week]);

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ week, checks, logs, goal, notes }));
        }, [week, checks, logs, goal, notes]);

        const toggleCheck = (idx) => {
          const key = `${week}-${idx}`;
          setChecks((prev) => ({ ...prev, [key]: !prev[key] }));
        };

        const updateLog = (idx, field, value) => {
          const key = `${week}-${idx}`;
          setLogs((prev) => ({
            ...prev,
            [key]: {
              plannedType: prev[key]?.plannedType || weekPlan[idx].type,
              actualType: prev[key]?.actualType || weekPlan[idx].type,
              adapted: prev[key]?.adapted || false,
              ...(prev[key] || {}),
              [field]: value,
            },
          }));
        };

        const applyAlternative = (idx, newType, reset = false) => {
          const key = `${week}-${idx}`;
          const session = weekPlan[idx];
          setLogs((prev) => ({
            ...prev,
            [key]: {
              ...(prev[key] || {}),
              plannedType: session.type,
              actualType: reset ? session.type : newType,
              adapted: reset ? false : newType !== session.type,
            },
          }));
        };

        const todayActualType = logs[`${week}-${todayIndex}`]?.actualType || todayWorkout.type;

        return (
          <div className="mx-auto max-w-5xl p-4 pb-24">
            <div className="grid gap-4 md:grid-cols-3">
              <div className="md:col-span-2 rounded-3xl bg-white p-5 shadow-sm border">
                <div className="flex flex-col gap-3 md:flex-row md:justify-between md:items-center">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-900">Triatló Fornells App</h1>
                    <p className="mt-1 text-sm text-slate-600">Per entrenar amb control, adaptar dies complicats i arribar bé a Fornells.</p>
                  </div>
                  <span className={`inline-flex rounded-full px-3 py-1 text-sm font-medium ${currentPhase.color}`}>Fase {currentPhase.name}</span>
                </div>
                <div className="mt-4 grid gap-3 sm:grid-cols-4">
                  <Stat label="Setmana" value={`${week}/24`} />
                  <Stat label="Dies" value={String(daysToRace)} />
                  <Stat label="Compliment" value={`${completion}%`} />
                  <Stat label="Objectiu" value={goal === "finish" ? "Acabar" : goal === "steady" ? "Bon ritme" : "Disfrutar"} />
                </div>
              </div>

              <div className="rounded-3xl bg-white p-5 shadow-sm border">
                <div className="text-sm text-slate-500">Entreno d'avui</div>
                <div className="mt-2 text-lg font-semibold">{emoji(todayActualType)} {todayWorkout.title}</div>
                <div className="mt-2 text-sm text-slate-600">{todayWorkout.details}</div>
              </div>
            </div>

            <div className="mt-6 rounded-3xl bg-white p-5 shadow-sm border">
              <div className="flex flex-wrap gap-2 justify-between items-center">
                <h2 className="text-xl font-semibold">Planificació setmanal</h2>
                <div className="flex gap-2">
                  <button className="rounded-2xl border px-4 py-2 text-sm" onClick={() => setWeek((w) => Math.max(1, w - 1))}>Setmana anterior</button>
                  <button className="rounded-2xl border px-4 py-2 text-sm" onClick={() => setWeek((w) => Math.min(24, w + 1))}>Següent</button>
                </div>
              </div>

              <div className="mt-4 space-y-3">
                {weekPlan.map((session, idx) => {
                  const key = `${week}-${idx}`;
                  const log = logs[key] || {};
                  const actualType = log.actualType || session.type;
                  const adapted = log.adapted;
                  const showAlt = openAlt[key];
                  return (
                    <div key={key} className={`rounded-2xl border p-4 ${checks[key] ? "bg-emerald-50 border-emerald-300" : "bg-white"}`}>
                      <div className="flex gap-3 justify-between items-start">
                        <div className="min-w-0">
                          <div className="font-semibold text-slate-900">{emoji(actualType)} {session.day} · {session.title}</div>
                          <div className="mt-1 text-sm text-slate-600">{session.details}</div>
                          <div className="mt-2 flex flex-wrap gap-2 text-xs">
                            <span className="rounded-full bg-slate-100 px-3 py-1">{session.duration}</span>
                            <span className="rounded-full bg-slate-100 px-3 py-1">{session.focus}</span>
                            {adapted && <span className="rounded-full bg-blue-100 text-blue-700 px-3 py-1">Adaptat</span>}
                          </div>
                          {adapted && log.plannedType !== actualType && (
                            <div className="mt-2 text-sm text-blue-700">Previst: {log.plannedType} · Fet/escollit: {actualType}</div>
                          )}
                        </div>
                        <label className="flex items-center gap-2 text-sm shrink-0">
                          <input type="checkbox" checked={!!checks[key]} onChange={() => toggleCheck(idx)} />
                          Fet
                        </label>
                      </div>

                      {alternatives[session.type] && (
                        <div className="mt-3">
                          <button className="rounded-xl border px-3 py-2 text-sm" onClick={() => setOpenAlt((prev) => ({ ...prev, [key]: !prev[key] }))}>
                            Alternatives i readaptació
                          </button>
                          {showAlt && (
                            <div className="mt-2 space-y-2">
                              {alternatives[session.type].map((alt, i) => (
                                <button key={i} className="block w-full rounded-xl border bg-slate-50 p-3 text-left" onClick={() => applyAlternative(idx, alt.type)}>
                                  <div className="font-medium">{emoji(alt.type)} {alt.title}</div>
                                  <div className="text-sm text-slate-600">{alt.details}</div>
                                </button>
                              ))}
                              <button className="block w-full rounded-xl border border-dashed p-3 text-left text-sm text-slate-600" onClick={() => applyAlternative(idx, session.type, true)}>
                                Tornar a l'entreno original
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="mt-6 grid gap-4 md:grid-cols-2">
              <div className="rounded-3xl bg-white p-5 shadow-sm border">
                <h2 className="text-xl font-semibold">Notes generals</h2>
                <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="mt-3 min-h-[160px] w-full rounded-2xl border p-3" placeholder="Sensacions, canvis, disponibilitat..." />
              </div>

              <div className="rounded-3xl bg-white p-5 shadow-sm border">
                <h2 className="text-xl font-semibold">Objectiu</h2>
                <select value={goal} onChange={(e) => setGoal(e.target.value)} className="mt-3 w-full rounded-2xl border p-3">
                  <option value="finish">Acabar bé</option>
                  <option value="steady">Bon ritme i control</option>
                  <option value="enjoy">Disfrutar fort</option>
                </select>
                <div className="mt-4 space-y-2 text-sm text-slate-600">
                  <div>• Natació: sensació còmoda, sense estrès</div>
                  <div>• Bici: ritme constant, sense buidar-te</div>
                  <div>• Run: acabar amb control, no patint</div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function Stat({ label, value }) {
        return (
          <div className="rounded-2xl border bg-slate-50 p-3">
            <div className="text-xs text-slate-500">{label}</div>
            <div className="mt-1 text-xl font-semibold text-slate-900">{value}</div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
